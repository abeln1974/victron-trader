version: '3.8'

services:
  victron-trader:
    build: .
    container_name: victron-trader
    restart: unless-stopped

    # Network mode for direct access to Victron on LAN
    # Host network gir enklest tilgang til Cerbo GX på 192.168.1.x
    network_mode: host
    
    # Option 2: Bridge network (hvis du vil isolere)
    # networks:
    #   - victron-net
    
    environment:
      # Victron Modbus-TCP config
      - VICTRON_HOST=${VICTRON_HOST:-192.168.1.60}
      - VICTRON_MODBUS_PORT=${VICTRON_MODBUS_PORT:-502}
      - VICTRON_UNIT_ID=${VICTRON_UNIT_ID:-246}
      
      # Market
      - PRICE_AREA=${PRICE_AREA:-NO1}
      - VAT=${VAT:-1.25}
      
      # Battery (Abelgard: 4x12.5kWh=50kWh NMC, 10kW max)
      # NMC: hold 20-90% for lang levetid (unngå langvarig >90% og <20%)
      - BATTERY_CAPACITY_KWH=${BATTERY_CAPACITY_KWH:-45.6}
      - BATTERY_MAX_CHARGE_KW=${BATTERY_MAX_CHARGE_KW:-10}
      - BATTERY_MAX_DISCHARGE_KW=${BATTERY_MAX_DISCHARGE_KW:-10}
      - BATTERY_EFFICIENCY=${BATTERY_EFFICIENCY:-0.95}
      - MIN_SOC=${MIN_SOC:-20}
      - MAX_SOC=${MAX_SOC:-90}
      
      # Strategy
      - MIN_PRICE_DIFF_NOK=${MIN_PRICE_DIFF_NOK:-0.30}
      - FORECAST_HOURS=${FORECAST_HOURS:-24}
      
      # Home Assistant - Qubino primærkilde grid (alle 3 faser IT-nett)
      - HA_URL=${HA_URL:-https://homeassistant.abelgaard.no}
      - HA_TOKEN=${HA_TOKEN:-}
      - HA_TIMEOUT=${HA_TIMEOUT:-3.0}
      - HA_MIN_INTERVAL=${HA_MIN_INTERVAL:-30.0}

      # EVCS elbil-lader (1-fase, 6-16A)
      - EVCS_ENTITY_PREFIX=${EVCS_ENTITY_PREFIX:-evcs_hq2309vtvnf}
      - EVCS_MIN_CURRENT_A=${EVCS_MIN_CURRENT_A:-6}
      - EVCS_MAX_CURRENT_A=${EVCS_MAX_CURRENT_A:-16}
      - EVCS_PHASES=${EVCS_PHASES:-1}
      - PEAK_LIMIT_KW=${PEAK_LIMIT_KW:-9.5}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    
    volumes:
      # Persist database and logs
      - ./data:/app/data
      - ./logs:/app/logs
    
    # Optional: CPU/memory limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  victron-web:
    build: .
    container_name: victron-web
    restart: unless-stopped
    command: python web.py
    network_mode: host  # Trenger tilgang til Cerbo GX på 192.168.1.60
    environment:
      - VICTRON_HOST=${VICTRON_HOST:-192.168.1.60}
      - VICTRON_MODBUS_PORT=${VICTRON_MODBUS_PORT:-502}
      - READONLY_MODE=true          # Kun lesing — ingen skriving til Cerbo GX
      - PRICE_AREA=${PRICE_AREA:-NO1}
      - VAT=${VAT:-1.25}
      - BATTERY_CAPACITY_KWH=${BATTERY_CAPACITY_KWH:-45.6}
      - BATTERY_MAX_CHARGE_KW=${BATTERY_MAX_CHARGE_KW:-10}
      - BATTERY_MAX_DISCHARGE_KW=${BATTERY_MAX_DISCHARGE_KW:-10}
      - BATTERY_EFFICIENCY=${BATTERY_EFFICIENCY:-0.95}
      - MIN_SOC=${MIN_SOC:-20}
      - MAX_SOC=${MAX_SOC:-90}
      - SOLAR_MAX_KW=${SOLAR_MAX_KW:-5.0}
      - HA_URL=${HA_URL:-https://homeassistant.abelgaard.no}
      - HA_TOKEN=${HA_TOKEN:-}
      - HA_TIMEOUT=${HA_TIMEOUT:-3.0}
      - HA_MIN_INTERVAL=${HA_MIN_INTERVAL:-30.0}
      - WEB_PORT=8080
      - DB_PATH=/app/data/profit.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

# Optional: Bridge network (hvis ikke host network)
# networks:
#   victron-net:
#     driver: bridge
